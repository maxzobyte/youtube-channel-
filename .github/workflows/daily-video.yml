name: Daily YouTube Video Pipeline

on:
  schedule:
    # Runs every day at 08:00 UTC (adjust to your preferred time)
    - cron: '0 8 * * *'
  workflow_dispatch: {}  # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (ffmpeg, fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install edge-tts moviepy requests google-auth google-auth-oauthlib google-api-python-client pillow mutagen

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          python main.py

      - name: Upload artifacts for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: |
            script_long.json
            script_short.json
            video_long.mp4
            video_short.mp4
          retention-days: 3
          if-no-files-found: ignore

      - name: Commit updated topic history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f topic_history.json ]; then
            git add topic_history.json
            git diff --cached --quiet || git commit -m "Update topic history [skip ci]"
            git push
          fi
